<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoPRO Muscle Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --yopro-green: #1D9E75;
            --yopro-dark: #0A0A0A;
            --yopro-amber: #EF9F27;
            --accent: #1D9E75;
            --bg-card: #151515;
            --text-main: #FFFFFF;
            --text-dim: #AAAAAA;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--yopro-dark);
            font-family: 'DM Sans', sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        #game-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            height: 100vh;
        }

        /* Left Side: Athlete and Click Area */
        #athlete-section {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            cursor: pointer;
            overflow: hidden;
        }

        canvas#athlete-canvas {
            max-width: 100%;
            max-height: 80%;
        }

        #stats-overlay {
            position: absolute;
            top: 40px;
            left: 40px;
            pointer-events: none;
        }

        .main-protein {
            font-family: 'Bebas Neue', cursive;
            font-size: 80px;
            line-height: 1;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(29, 158, 117, 0.3);
        }

        .pps {
            font-size: 20px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Right Side: Upgrades and Menu */
        #menu-section {
            background: var(--bg-card);
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }

        h2 {
            font-family: 'Bebas Neue', cursive;
            font-size: 32px;
            margin: 0 0 20px 0;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .level-card {
            background: #222;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }

        .level-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .level-progress-bg {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }

        .level-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            background: #222;
            border: none;
            color: var(--text-dim);
            font-family: 'Bebas Neue', cursive;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            background: #2a2a2a;
        }

        .upgrade-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .upgrade-item {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .upgrade-item:hover:not(.disabled) {
            background: #2a2a2a;
            transform: translateX(5px);
        }

        .upgrade-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upgrade-info {
            flex: 1;
        }

        .upgrade-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 2px;
        }

        .upgrade-desc {
            font-size: 12px;
            color: var(--text-dim);
            font-style: italic;
        }

        .upgrade-cost {
            font-family: 'Bebas Neue', cursive;
            font-size: 20px;
            color: var(--yopro-amber);
        }

        .upgrade-count {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 10px;
            background: var(--accent);
            padding: 2px 5px;
            border-radius: 10px;
        }

        .flavor-selector {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }

        .flavor-btn {
            height: 40px;
            border: 2px solid #333;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .flavor-btn.active {
            border-color: white;
            transform: scale(1.1);
        }

        #float-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .float-text {
            position: absolute;
            font-family: 'Bebas Neue', cursive;
            font-size: 32px;
            color: white;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        #prestige-btn {
            margin-top: auto;
            background: var(--yopro-amber);
            color: black;
            font-family: 'Bebas Neue', cursive;
            font-size: 24px;
            padding: 15px;
            border: none;
            cursor: pointer;
            display: none;
            border-radius: 8px;
        }

        @media (max-width: 800px) {
            #game-container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
            #menu-section {
                border-left: none;
                border-top: 1px solid #333;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="athlete-section" onclick="handleAthleteClick(event)">
            <div id="stats-overlay">
                <div class="pps" id="pps-val">0g Protein / Sec</div>
                <div class="main-protein" id="protein-val">0g</div>
            </div>
            <canvas id="athlete-canvas"></canvas>
            <div id="float-container"></div>
        </div>

        <div id="menu-section">
            <div class="level-card">
                <div class="level-name" id="lvl-name">Level 1: Beginner Athlete</div>
                <div class="level-progress-bg">
                    <div class="level-progress-fill" id="lvl-progress"></div>
                </div>
            </div>

            <h2>Flavor Selector</h2>
            <div class="flavor-selector">
                <div class="flavor-btn" style="background: #1D9E75;" onclick="setFlavor('Nature')" title="Nature"></div>
                <div class="flavor-btn" style="background: #795548;" onclick="setFlavor('Chocolat')" title="Chocolat"></div>
                <div class="flavor-btn" style="background: #C0392B;" onclick="setFlavor('Fraise')" title="Fraise Framboise"></div>
                <div class="flavor-btn" style="background: #EF9F27;" onclick="setFlavor('Caramel')" title="Café Caramel"></div>
                <div class="flavor-btn" style="background: #D4AF37;" onclick="setFlavor('Vanilla')" title="Vanille Biscuit"></div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="showTab('training')">Training</button>
                <button class="tab" onclick="showTab('nutrition')">Nutrition</button>
                <button class="tab" onclick="showTab('recovery')">Recovery</button>
            </div>

            <div id="upgrade-list" class="upgrade-list">
                <!-- Upgrades injected here -->
            </div>

            <button id="prestige-btn" onclick="handlePrestige()">PRESTIGE: REBUILD STRONGER (x1.5 Multiplier)</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('athlete-canvas');
        const ctx = canvas.getContext('2d');
        const proteinEl = document.getElementById('protein-val');
        const ppsEl = document.getElementById('pps-val');
        const lvlNameEl = document.getElementById('lvl-name');
        const lvlProgressEl = document.getElementById('lvl-progress');
        const upgradeListEl = document.getElementById('upgrade-list');
        const prestigeBtn = document.getElementById('prestige-btn');

        // Game State
        let state = {
            protein: 0,
            totalProtein: 0,
            level: 1,
            prestigeMult: 1,
            activeFlavor: 'Nature',
            upgrades: {
                // Training
                morningRun: 0,
                gymSession: 0,
                hiitWorkout: 0,
                // Nutrition (Flavors)
                yoNature: 0,
                yoChocolat: 0,
                yoFraise: 0,
                yoCaramel: 0,
                yoVanilla: 0,
                // Recovery
                sleepOpt: 0,
                proteinTiming: 0
            }
        };

        const DATA = {
            levels: [
                "Beginner Athlete", "Amateur Runner", "Fitness Enthusiast", 
                "Gym Regular", "Dedicated Trainer", "Semi-Pro Athlete", 
                "Competitive Athlete", "Elite Performer", "Champion", "YoPRO Legend"
            ],
            upgrades: {
                training: [
                    { id: 'morningRun', name: 'Morning Run', baseCost: 10, type: 'add_click', value: 2, desc: '"Start your day like a champion"' },
                    { id: 'gymSession', name: 'Gym Session', baseCost: 500, type: 'mult_click', value: 2, desc: '"Heavy lifting needs heavy protein"' },
                    { id: 'hiitWorkout', name: 'HIIT Workout', baseCost: 2500, type: 'mult_click', value: 5, desc: '"Intensity demands recovery"' }
                ],
                nutrition: [
                    { id: 'yoNature', name: 'YoPRO Nature', baseCost: 50, type: 'pps', value: 1, desc: '"Pure. Clean. Powerful."' },
                    { id: 'yoChocolat', name: 'YoPRO Chocolat', baseCost: 200, type: 'pps', value: 3, desc: '"Indulge the right way"' },
                    { id: 'yoFraise', name: 'YoPRO Fraise', baseCost: 800, type: 'pps', value: 8, desc: '"Fresh fuel, real results"' },
                    { id: 'yoCaramel', name: 'YoPRO Café Caramel', baseCost: 2000, type: 'pps', value: 15, desc: '"The energy of espresso"' },
                    { id: 'yoVanilla', name: 'YoPRO Vanille Biscuit', baseCost: 5000, type: 'pps', value: 25, desc: '"Sweet. Satisfying. Smart."' }
                ],
                recovery: [
                    { id: 'sleepOpt', name: 'Sleep Optimization', baseCost: 10000, type: 'mult_all', value: 1.5, desc: '"Muscles grow while you sleep"' },
                    { id: 'proteinTiming', name: 'Protein Timing', baseCost: 25000, type: 'mult_all', value: 2, desc: '"Take your YoPRO within 30m"' }
                ]
            },
            flavors: {
                Nature: { color: '#1D9E75', band: '#00D2FF' },
                Chocolat: { color: '#795548', band: '#EF9F27' },
                Fraise: { color: '#C0392B', band: '#FF4D6D' },
                Caramel: { color: '#EF9F27', band: '#EF9F27' },
                Vanilla: { color: '#D4AF37', band: '#F5DEB3' }
            }
        };

        let currentTab = 'training';

        // Load Game
        function load() {
            const saved = localStorage.getItem('yopro_muscle_builder');
            if (saved) {
                state = JSON.parse(saved);
            }
            updateUI();
            setFlavor(state.activeFlavor);
        }

        function save() {
            localStorage.setItem('yopro_muscle_builder', JSON.stringify(state));
        }

        // Calculations
        function getClickValue() {
            let val = 1;
            val += state.upgrades.morningRun * 2;
            val *= Math.pow(2, state.upgrades.gymSession);
            val *= Math.pow(5, state.upgrades.hiitWorkout);
            val *= state.prestigeMult;
            return val;
        }

        function getPPS() {
            let pps = 0;
            pps += state.upgrades.yoNature * 1;
            pps += state.upgrades.yoChocolat * 3;
            pps += state.upgrades.yoFraise * 8;
            pps += state.upgrades.yoCaramel * 15;
            pps += state.upgrades.yoVanilla * 25;
            
            let mult = 1;
            mult *= Math.pow(1.5, state.upgrades.sleepOpt);
            mult *= Math.pow(2, state.upgrades.proteinTiming);
            
            return pps * mult * state.prestigeMult;
        }

        function getCost(upgrade) {
            const count = state.upgrades[upgrade.id] || 0;
            return Math.floor(upgrade.baseCost * Math.pow(1.15, count));
        }

        function getLevelReq() {
            return Math.floor(100 * Math.pow(4, state.level - 1));
        }

        // UI Updates
        function updateUI() {
            proteinEl.textContent = Math.floor(state.protein) + 'g';
            ppsEl.textContent = getPPS().toFixed(1) + 'g Protein / Sec';
            
            const req = getLevelReq();
            lvlNameEl.textContent = `Level ${state.level}: ${DATA.levels[state.level-1]}`;
            lvlProgressEl.style.width = Math.min(100, (state.protein / req) * 100) + '%';

            if (state.protein >= req && state.level < 10) {
                state.level++;
                createFloatText(window.innerWidth/4, window.innerHeight/2, "LEVEL UP!", "#EF9F27");
            }

            if (state.level === 10) {
                prestigeBtn.style.display = 'block';
            } else {
                prestigeBtn.style.display = 'none';
            }

            renderUpgrades();
            drawAthlete();
        }

        function renderUpgrades() {
            upgradeListEl.innerHTML = '';
            DATA.upgrades[currentTab].forEach(upg => {
                const cost = getCost(upg);
                const canAfford = state.protein >= cost;
                const count = state.upgrades[upg.id] || 0;

                const item = document.createElement('div');
                item.className = `upgrade-item ${canAfford ? '' : 'disabled'}`;
                item.innerHTML = `
                    <div class="upgrade-info">
                        <div class="upgrade-name">${upg.name}</div>
                        <div class="upgrade-desc">${upg.desc}</div>
                    </div>
                    <div class="upgrade-cost">${cost}g</div>
                    ${count > 0 ? `<div class="upgrade-count">${count}</div>` : ''}
                `;
                item.onclick = () => buyUpgrade(upg);
                upgradeListEl.appendChild(item);
            });
        }

        function showTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[onclick="showTab('${tab}')"]`).classList.add('active');
            renderUpgrades();
        }

        function setFlavor(flavor) {
            state.activeFlavor = flavor;
            const colors = DATA.flavors[flavor];
            document.documentElement.style.setProperty('--accent', colors.color);
            
            document.querySelectorAll('.flavor-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.title.includes(flavor)) btn.classList.add('active');
            });
            updateUI();
        }

        // Actions
        function handleAthleteClick(e) {
            const val = getClickValue();
            state.protein += val;
            state.totalProtein += val;
            createFloatText(e.clientX, e.clientY, `+${val.toFixed(0)}g`);
            updateUI();
            save();
        }

        function buyUpgrade(upg) {
            const cost = getCost(upg);
            if (state.protein >= cost) {
                state.protein -= cost;
                state.upgrades[upg.id]++;
                updateUI();
                save();
            }
        }

        function handlePrestige() {
            if (confirm("Prestige will reset your protein and upgrades, but give you a permanent x1.5 multiplier. Continue?")) {
                state.prestigeMult *= 1.5;
                state.protein = 0;
                state.level = 1;
                Object.keys(state.upgrades).forEach(k => state.upgrades[k] = 0);
                updateUI();
                save();
            }
        }

        function createFloatText(x, y, text, color = 'white') {
            const el = document.createElement('div');
            el.className = 'float-text';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = color;
            document.getElementById('float-container').appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // Rendering Athlete
        function drawAthlete() {
            const w = canvas.width = 400;
            const h = canvas.height = 600;
            ctx.clearRect(0, 0, w, h);

            const scale = 0.8 + (state.level * 0.05);
            ctx.save();
            ctx.translate(w/2, h - 50);
            ctx.scale(scale, scale);

            const muscleOffset = state.level * 2;

            // Simple Procedural Body
            ctx.fillStyle = '#ffdbac';
            
            // Legs
            ctx.fillRect(-30 - muscleOffset, -150, 20 + muscleOffset, 150);
            ctx.fillRect(10, -150, 20 + muscleOffset, 150);

            // Torso
            ctx.fillStyle = state.level >= 6 ? varColor('--accent') : '#333'; // Jersey at level 6
            ctx.fillRect(-50 - muscleOffset, -350, 100 + muscleOffset * 2, 200);
            
            // Shoulders/Chest Definition
            if (state.level >= 4) {
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 2;
                ctx.strokeRect(-40, -330, 80, 50);
            }

            // Head
            ctx.fillStyle = '#ffdbac';
            ctx.beginPath();
            ctx.arc(0, -380, 30, 0, Math.PI * 2);
            ctx.fill();

            // Arms
            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(-80 - muscleOffset * 1.5, -340, 30 + muscleOffset, 150);
            ctx.fillRect(50 + muscleOffset * 0.5, -340, 30 + muscleOffset, 150);

            // Item in hand (Level 3+)
            if (state.level >= 3) {
                ctx.fillStyle = '#111';
                ctx.fillRect(60 + muscleOffset, -230, 20, 40); // Bottle
                ctx.fillStyle = DATA.flavors[state.activeFlavor].band;
                ctx.fillRect(60 + muscleOffset, -215, 20, 10);
            }

            // Medal (Level 9+)
            if (state.level >= 9) {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(0, -310, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#D4AF37';
                ctx.lineWidth = 3;
                ctx.moveTo(-20, -350);
                ctx.lineTo(0, -310);
                ctx.lineTo(20, -350);
                ctx.stroke();
            }

            ctx.restore();
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        // Tick
        setInterval(() => {
            const pps = getPPS();
            state.protein += pps / 10;
            state.totalProtein += pps / 10;
            updateUI();
        }, 100);

        // Auto Save
        setInterval(save, 5000);

        load();
        window.onresize = drawAthlete;
    </script>
</body>
</html>
