<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoPRO | Exclusive Giveaway</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00D2FF;
            --accent-glow: rgba(0, 210, 255, 0.4);
            --dark: #06100c;
            --darker: #030a07;
            --white: #ffffff;
            --silver: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--darker);
            background-image: url('images/Cover_image.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* ── GLOBAL OVERLAY ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(3,10,7,0.2) 0%,
                rgba(3,10,7,0.4) 50%,
                rgba(3,10,7,0.7) 100%
            );
            pointer-events: none;
            z-index: 0;
        }

        /* ── SCANLINE OVERLAY ── */
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.05) 2px,
                rgba(0,0,0,0.05) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            animation: containerFadeIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes containerFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-card {
            background: rgba(6, 16, 12, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(30px);
            padding: 60px 50px;
            border-radius: 8px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 40px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 56px;
            letter-spacing: 5px;
            color: var(--white);
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .subtitle {
            font-family: 'Barlow Condensed', sans-serif;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 45px;
        }

        /* ── FORM ELEMENTS ── */
        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        label {
            display: block;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: var(--accent);
            opacity: 0.8;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: white;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            font-family: 'DM Sans', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 210, 255, 0.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        input::placeholder {
            color: rgba(255,255,255,0.15);
        }

        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 22px;
            font-family: 'Bebas Neue', cursive;
            font-size: 28px;
            letter-spacing: 4px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 210, 255, 0.5);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            text-align: center;
            width: 100%;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* ── STATES ── */
        .denied-content, .success-content {
            display: none;
            text-align: center;
            flex-direction: column;
            align-items: center;
        }

        .status-icon {
            font-size: 80px;
            margin-bottom: 25px;
            display: block;
        }

        .error-title { color: #ff4757 !important; text-shadow: 0 0 20px rgba(255, 71, 87, 0.3) !important; }

        #error-msg {
            color: #ff4757;
            text-align: center;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: bold;
            display: none;
            background: rgba(255, 71, 87, 0.1);
            padding: 10px;
            border-radius: 4px;
        }

        .success-title { color: var(--accent) !important; }

        /* Smooth reveal animation for content changes */
        .reveal {
            animation: revealEffect 0.5s ease forwards;
        }

        @keyframes revealEffect {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="container">
        
        <div class="form-card" id="main-card">
            
            <!-- FORM STATE -->
            <div id="giveaway-form-content">
                <h1>JOIN THE ELITE</h1>
                <p class="subtitle">Enter your details to confirm your entry</p>
                
                <div id="error-msg">SYSTEM ERROR: PLEASE COMPLETE ALL FIELDS</div>

                <form id="giveaway-form">
                    <div class="form-group">
                        <label>Identity</label>
                        <input type="text" id="name" placeholder="FULL NAME" required>
                    </div>
                    <div class="form-group">
                        <label>Secure Email</label>
                        <input type="email" id="email" placeholder="EMAIL ADDRESS" required>
                    </div>
                    <div class="form-group">
                        <label>Social Handle</label>
                        <input type="text" id="handle" placeholder="@USERNAME" required>
                    </div>
                    <button type="submit" class="btn-submit">SUBMIT ENTRY</button>
                </form>
            </div>

            <!-- DENIED STATE -->
            <div class="denied-content" id="denied-content">
                <span class="status-icon">🔒</span>
                <h1 class="error-title">ACCESS DENIED</h1>
                <p class="subtitle">Qualification threshold not met (500g required)</p>
                <a href="index.html" class="btn-submit" style="text-decoration: none;">RETURN TO HUB</a>
            </div>

            <!-- SUCCESS STATE -->
            <div class="success-content" id="success-content">
                <span class="status-icon" style="color: var(--accent);">✔</span>
                <h1 class="success-title">ENTRY SECURED</h1>
                <p class="subtitle">You're in the running. Stay tuned to your email.</p>
                <a href="index.html" class="btn-submit" style="text-decoration: none; background: rgba(255,255,255,0.05); border: 1px solid var(--accent); color: var(--accent);">BACK TO HUB</a>
            </div>

            <a href="index.html" class="back-link">ABORT MISSION · HUB</a>
        </div>

    </div>

    <script src="js/yopro-api.js"></script>
    <script>
        const formContent = document.getElementById('giveaway-form-content');
        const deniedContent = document.getElementById('denied-content');
        const successContent = document.getElementById('success-content');

        window.onload = function() {
            if (!YoPRO.isQualified()) {
                formContent.style.display = 'none';
                deniedContent.style.display = 'flex';
                deniedContent.classList.add('reveal');
            } else {
                formContent.style.display = 'block';
                formContent.classList.add('reveal');
            }
        };

        document.getElementById('giveaway-form').onsubmit = function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const handle = document.getElementById('handle').value;

            if (name && email && handle) {
                // Smooth transition to success
                formContent.style.opacity = '0';
                setTimeout(() => {
                    formContent.style.display = 'none';
                    successContent.style.display = 'flex';
                    successContent.classList.add('reveal');
                    console.log('Elite Entry:', { name, email, handle });
                }, 400);
            } else {
                const err = document.getElementById('error-msg');
                err.style.display = 'block';
                err.classList.add('reveal');
            }
        };
    </script>
</body>
</html>
