<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoPRO Arcade | Rewards Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00D2FF; /* Neon Blue / Nature */
            --accent-glow: rgba(0, 210, 255, 0.4);
            --secondary: #e0e0e0; /* Silver / White */
            --dark: #06100c;
            --darker: #030a07;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--darker);
            background-image: url('images/Cover_image.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
            /* Brighten the image slightly */
            backdrop-filter: brightness(1.1);
        }

        /* ── GLOBAL OVERLAY ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(3,10,7,0.1) 0%,
                rgba(3,10,7,0.2) 50%,
                rgba(3,10,7,0.5) 100%
            );
            pointer-events: none;
            z-index: 0;
        }

        /* ── SCANLINE OVERLAY ── */
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.05) 2px,
                rgba(0,0,0,0.05) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ── HERO ── */
        .hero {
            position: relative;
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 1;
        }

        .hero-content {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-badge {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--accent-glow);
            padding: 8px 24px;
            border-radius: 2px;
            margin-bottom: 60px;
            background: rgba(0, 210, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        /* ── CIRCLE BUTTONS ── */
        .side-buttons {
            display: flex;
            gap: clamp(40px, 12vw, 150px);
            align-items: center;
            justify-content: center;
        }

        .side-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            transition: transform 0.3s;
        }

        .side-btn:hover { transform: translateY(-8px); }

        .side-btn-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            transition: color 0.3s;
        }

        .side-btn:hover .side-btn-label { color: var(--accent); }

        .side-btn-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(6, 16, 12, 0.5); /* Semi-transparent native dark */
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .side-btn:hover .side-btn-circle {
            border-color: var(--accent);
            background: rgba(6, 16, 12, 0.7);
            box-shadow: 
                0 0 40px var(--accent-glow),
                inset 0 0 20px var(--accent-glow);
        }

        .side-btn-icon { font-size: 48px; line-height: 1; }

        .side-btn-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 2px;
            color: var(--white);
        }

        /* ── STATS BAR ── */
        .stats-bar {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            margin: -60px auto 100px;
            max-width: 800px;
            width: 90%;
            background: rgba(6, 16, 12, 0.5); /* Semi-transparent native dark */
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .stat-item {
            flex: 1;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .stat-item + .stat-item::before {
            content: '';
            position: absolute;
            left: 0; top: 25%; height: 50%;
            width: 1px;
            background: rgba(255,255,255,0.1);
        }

        .stat-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 6px;
        }

        .stat-value {
            font-family: 'Bebas Neue', cursive;
            font-size: 48px;
            line-height: 1;
        }

        /* ── CONTENT CONTAINER ── */
        .content-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px 120px;
            position: relative;
            z-index: 1;
        }

        /* ── GIVEAWAY HUB ── */
        .giveaway-section {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .giveaway-box {
            background: rgba(6, 16, 12, 0.5); /* Semi-transparent native dark */
            border: 2px dashed rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            padding: 80px 40px;
            border-radius: 4px;
            position: relative;
            transition: all 0.5s;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .giveaway-box.unlocked {
            border: 2px solid var(--accent);
            background: rgba(6, 16, 12, 0.7);
            box-shadow: 0 0 60px rgba(0, 210, 255, 0.2);
        }

        .lock-icon { font-size: 60px; margin-bottom: 30px; display: block; filter: grayscale(1) opacity(0.5); }
        .unlocked .lock-icon { filter: none; opacity: 1; color: var(--accent); }

        .btn-giveaway {
            display: inline-block;
            padding: 20px 80px;
            font-family: 'Bebas Neue', cursive;
            font-size: 32px;
            letter-spacing: 3px;
            border-radius: 3px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.2);
            cursor: not-allowed;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .unlocked .btn-giveaway {
            background: var(--accent);
            color: #000;
            cursor: pointer;
            box-shadow: 0 15px 50px rgba(0, 210, 255, 0.4);
            border: none;
        }

        .prize-list {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .prize-item {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(255,255,255,0.05);
            padding: 10px 24px;
            border-radius: 2px;
            color: rgba(255,255,255,0.4);
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 80px 40px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.15);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .side-buttons { gap: 40px; }
            .side-btn-circle { width: 110px; height: 110px; }
            .side-btn-icon { font-size: 36px; }
            .stats-bar { flex-direction: column; margin-top: -30px; }
            .stat-item + .stat-item::before { display: none; }
            .stat-item { border-bottom: 1px solid rgba(255,255,255,0.05); }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <!-- ══════════════ HERO ══════════════ -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-badge">Level Up · Protein Up</div>

            <!-- MAIN TWO CIRCLE BUTTONS -->
            <div class="side-buttons">
                <a href="Protein_Runner.html" class="side-btn">
                    <span class="side-btn-label">Protein Rush</span>
                    <div class="side-btn-circle">
                        <span class="side-btn-icon">🏃</span>
                        <span class="side-btn-name">PLAY</span>
                    </div>
                </a>

                <a href="Slot_Machine.html" class="side-btn">
                    <span class="side-btn-label">Protein Slots</span>
                    <div class="side-btn-circle">
                        <span class="side-btn-icon">🎰</span>
                        <span class="side-btn-name">SPIN</span>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <!-- ══════════════ STATS ══════════════ -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-label">Protein Wallet</div>
            <div class="stat-value" id="wallet-balance" style="color:var(--accent);">0g</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Best Score</div>
            <div class="stat-value" id="action-score">0g</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Status</div>
            <div class="stat-value" id="status-text" style="color:rgba(255,255,255,0.3);">Locked</div>
        </div>
    </div>

    <div class="content-container">
        
        <!-- ══════════════ GIVEAWAY ══════════════ -->
        <section class="giveaway-section">
            <div id="giveaway-box" class="giveaway-box">
                <span class="lock-icon">🔒</span>
                <a href="giveaway.html" id="giveaway-btn" class="btn-giveaway">ENTER GIVEAWAY</a>

                <div class="prize-list">
                    <div class="prize-item">PlayStation 5</div>
                    <div class="prize-item">iPhone 15 Pro</div>
                    <div class="prize-item">YoPRO Kit</div>
                    <div class="prize-item">Gym Membership</div>
                </div>
            </div>
        </section>

    </div>

    <footer>&copy; 2026 YoPRO France — Fuel Your Ambition</footer>

    <script src="js/yopro-api.js"></script>
    <script>
        function updateHub() {
            const scores = YoPRO.getScores();
            const balance = YoPRO.getBalance();

            document.getElementById('wallet-balance').textContent = balance + 'g';
            // Best score among the two active games
            const bestAction = Math.max(scores.rush, scores.slots);
            document.getElementById('action-score').textContent = bestAction + 'g';

            if (YoPRO.isQualified()) {
                document.getElementById('giveaway-box').classList.add('unlocked');
                const st = document.getElementById('status-text');
                st.textContent = 'QUALIFIED';
                st.style.color = 'var(--accent)';
                document.getElementById('giveaway-btn').style.pointerEvents = 'auto';
            }
        }

        window.onload = updateHub;
    </script>

</body>
</html>
